<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain's Log</title>

    <!-- HTMX — gives HTML elements the ability to make HTTP requests -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- marked.js — converts Markdown text into HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            color: #c9c9c9;
            font-family: 'Courier New', Courier, monospace;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 { color: #7ec8e3; margin-bottom: 2rem; font-size: 1.6rem; }
        h2 { color: #7ec8e3; margin-bottom: 1rem; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 0.4rem; }

        section { margin-bottom: 3rem; }

        button {
            background: #1a3a4a;
            color: #7ec8e3;
            border: 1px solid #7ec8e3;
            padding: 0.5rem 1.2rem;
            font-family: inherit;
            cursor: pointer;
            font-size: 0.95rem;
        }
        button:hover { background: #7ec8e3; color: #0d0d0d; }

        #status { margin-top: 0.8rem; font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>

    <h1>// Captain's Log</h1>

    <!-- ── Section 1: Record ───────────────────────────────────────── -->
    <section>
        <h2>Record Entry</h2>
        <button id="record-btn">Start Recording</button>
        <p id="status">Idle</p>
    </section>

    <!-- ── Section 2: Today's Log ─────────────────────────────────── -->
    <section>
        <h2>Today's Log</h2>
        <!--
            hx-get       → calls GET /logs when clicked
            hx-target    → puts the response inside #log-content
            hx-swap      → replaces the inner HTML of the target
        -->
        <button hx-get="/logs" hx-target="#log-content" hx-swap="innerHTML">
            Load Today's Log
        </button>
        <div id="log-content" style="margin-top:1rem;"></div>
    </section>

    <!-- ── Section 3: Log History ─────────────────────────────────── -->
    <section>
        <h2>Log History</h2>
        <button hx-get="/logs" hx-target="#history-list" hx-swap="innerHTML">
            Load History
        </button>
        <div id="history-list" style="margin-top:1rem;"></div>
    </section>

    <script>
        // Placeholder — audio recording logic goes here in the next step
        document.getElementById('record-btn').addEventListener('click', () => {
            document.getElementById('status').textContent = 'Recording logic coming soon...';
        });
    </script>

</body>
</html>
