services:
  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    volumes:
      - ./data:/app/data
      - ./db:/app/db

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama

  # Database service - Under Development and not currently being used.
  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  ollama_models:
  pgdata: