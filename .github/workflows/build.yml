name: build-and-push          # just a label shown in the Actions tab

on:                           # the EVENT that triggers this
  push:
    branches: [main]          # only when you push to main

jobs:
  build:
    runs-on: ubuntu-latest    # the throwaway runner GitHub gives you
    permissions:              # <-- the gotcha. see note below.
      contents: read          # let it read your repo
      packages: write         # let it PUSH to GHCR
    steps:
      - name: Check out the code
        uses: actions/checkout@v6      # copies your repo onto the runner

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # who triggered the run
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-injected, see note

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4       # modern build engine; pays off in 3b

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/d-vella/captains-log:latest